<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Exchange</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:15px
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
background:#0f172a;
border:1px solid #334155;
color:white;
border-radius:8px
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white
}

</style>

</head>

<body>

<div class="card">

<h2 id="username"></h2>
<p>ID: <span id="uid"></span></p>

</div>


<div class="card">

<h3>Баланс</h3>

<p>RUB: <span id="rub"></span></p>
<p>USDT: <span id="usdt"></span></p>
<p>TON: <span id="ton"></span></p>

</div>


<div class="card">

<h3>Обмен</h3>

<select id="from">
<option value="rub">RUB</option>
<option value="usdt">USDT</option>
<option value="ton">TON</option>
</select>

<select id="to">
<option value="usdt">USDT</option>
<option value="ton">TON</option>
<option value="rub">RUB</option>
</select>

<input id="amount" placeholder="Сумма">

<button onclick="exchange()">Обменять</button>

</div>

<script src="webapp.js"></script>

</body>

</html>
