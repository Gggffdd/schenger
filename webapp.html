<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    const user = tg.initDataUnsafe.user;
    if (!user) {
        alert('Ошибка: не удалось получить данные пользователя');
    }

    const uid = user.id;
    const username = user.username || 'user';

    let currentPage = 'profile';
    let rates = {
        'USD': 1, 'EUR': 0.92, 'GBP': 0.79, 
        'JPY': 150.5, 'RUB': 90.5, 'CNY': 7.2,
        'CHF': 0.88, 'CAD': 1.35
    };

    // Утилиты
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = type === 'success' ? '#84fab0' : (type === 'error' ? '#ff6b6b' : '#667eea');
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function apiCall(endpoint, method = 'GET', data = null) {
        const url = `/api/${endpoint}`;
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' },
        };

        if (data) {
            options.body = JSON.stringify(data);
        }

        // Добавляем таймаут
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        options.signal = controller.signal;

        try {
            const response = await fetch(url, options);
            clearTimeout(timeoutId);
            
            const result = await response.json();
            
            if (result.error) {
                showToast(result.error, 'error');
                return null;
            }
            
            return result;
        } catch (error) {
            clearTimeout(timeoutId);
            if (error.name === 'AbortError') {
                showToast('Превышено время ожидания', 'error');
            } else {
                showToast('Ошибка сети', 'error');
            }
            console.error('API Error:', error);
            return null;
        }
    }

    // Загрузка курсов (асинхронно, не блокируя интерфейс)
    async function loadRates() {
        const data = await apiCall('rates');
        if (data) {
            rates = { ...rates, ...data };
        }
    }
    
    // Загружаем курсы в фоне
    setTimeout(loadRates, 100);

    // Навигация
    function renderNav() {
        const pages = [
            { id: 'profile', icon: 'fas fa-user', label: 'Профиль' },
            { id: 'exchange', icon: 'fas fa-exchange-alt', label: 'Обмен' },
            { id: 'promo', icon: 'fas fa-gift', label: 'Промо' },
            { id: 'history', icon: 'fas fa-history', label: 'История' },
            { id: 'referrals', icon: 'fas fa-users', label: 'Рефералы' }
        ];

        if (uid === 896706118) {
            pages.push({ id: 'admin', icon: 'fas fa-cog', label: 'Админ' });
        }

        const navBar = document.getElementById('navBar');
        navBar.innerHTML = pages.map(p => `
            <button class="nav-item ${currentPage === p.id ? 'active' : ''}" onclick="navigate('${p.id}')">
                <i class="${p.icon}"></i>
            </button>
        `).join('');
    }

    window.navigate = (page) => {
        currentPage = page;
        renderNav();
        renderPage();
    };

    // Рендер страниц
    async function renderPage() {
        const app = document.getElementById('app');
        app.innerHTML = '<div class="loader"></div>';

        try {
            switch (currentPage) {
                case 'profile':
                    await renderProfile();
                    break;
                case 'exchange':
                    renderExchange();
                    break;
                case 'promo':
                    renderPromo();
                    break;
                case 'history':
                    await renderHistory();
                    break;
                case 'referrals':
                    await renderReferrals();
                    break;
                case 'admin':
                    if (uid === 896706118) await renderAdmin();
                    else navigate('profile');
                    break;
                default:
                    await renderProfile();
            }
        } catch (error) {
            console.error('Render error:', error);
            app.innerHTML = `
                <div class="card" style="text-align: center;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ff6b6b; margin: 20px;"></i>
                    <p>Ошибка загрузки страницы</p>
                    <button class="btn" onclick="renderPage()">Повторить</button>
                </div>
            `;
        }
    }

    // Профиль
    async function renderProfile() {
        const data = await apiCall(`user?id=${uid}&username=${username}`);
        if (!data) {
            document.getElementById('app').innerHTML = `
                <div class="card" style="text-align: center;">
                    <i class="fas fa-sync-alt fa-spin" style="font-size: 48px; margin: 20px;"></i>
                    <p>Повторная попытка...</p>
                </div>
            `;
            setTimeout(renderProfile, 2000);
            return;
        }

        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <div class="profile-header">
                    <img class="avatar" 
                         src="https://t.me/i/userpic/320/${username}.jpg" 
                         onerror="this.src='https://via.placeholder.com/100'">
                    <div class="username">@${username}</div>
                    <div class="balance">${data.balance.toFixed(2)} <small>USD</small></div>
                    ${data.bonus_available ? 
                        '<button class="btn btn-success" onclick="claimDailyBonus()"><i class="fas fa-gift"></i> Ежедневный бонус</button>' : 
                        '<button class="btn" disabled><i class="fas fa-check"></i> Бонус получен</button>'
                    }
                </div>
                
                <div class="input-group">
                    <label>Реферальная ссылка:</label>
                    <input class="input-field" type="text" value="${data.referral_link}" readonly onclick="this.select()">
                    <button class="btn" onclick="copyReferralLink()"><i class="fas fa-copy"></i> Копировать</button>
                </div>
            </div>
        `;
    }

    window.claimDailyBonus = async () => {
        const result = await apiCall('daily_bonus', 'POST', { id: uid });
        if (result) {
            showToast(`Получено ${result.amount} USD!`, 'success');
            renderProfile();
        }
    };

    window.copyReferralLink = () => {
        const link = document.querySelector('.input-field').value;
        navigator.clipboard.writeText(link);
        showToast('Ссылка скопирована!', 'success');
    };

    // Обмен
    function renderExchange() {
        const currencies = Object.keys(rates);
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">💱 Обмен валюты</h2>
                
                <div class="input-group">
                    <select id="fromCurrency" class="input-field">
                        ${currencies.map(c => `<option value="${c}" ${c === 'USD' ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>
                
                <div style="text-align: center; margin: 10px 0;">
                    <i class="fas fa-arrow-down" style="font-size: 24px; opacity: 0.7;"></i>
                </div>
                
                <div class="input-group">
                    <select id="toCurrency" class="input-field">
                        ${currencies.map(c => `<option value="${c}" ${c === 'EUR' ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>
                
                <div class="input-group">
                    <input id="amount" type="number" class="input-field" placeholder="Сумма" min="0.01" step="0.01" value="1">
                </div>
                
                <div id="convertResult" style="font-size: 24px; font-weight: 700; text-align: center; margin: 20px 0; color: #84fab0;">
                    1 USD = ${rates['EUR']} EUR
                </div>
                
                <button class="btn" onclick="convertPreview()">
                    <i class="fas fa-calculator"></i> Предварительный расчёт
                </button>
                
                <button class="btn btn-success" onclick="doExchange()">
                    <i class="fas fa-exchange-alt"></i> Выполнить обмен
                </button>
            </div>
        `;
    }

    window.convertPreview = () => {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const amount = parseFloat(document.getElementById('amount').value) || 1;

        if (from === 'USD') {
            const result = amount * (rates[to] || 1);
            document.getElementById('convertResult').innerHTML = 
                `${amount} ${from} = ${result.toFixed(2)} ${to}`;
        } else if (to === 'USD') {
            const result = amount / (rates[from] || 1);
            document.getElementById('convertResult').innerHTML = 
                `${amount} ${from} = ${result.toFixed(2)} ${to}`;
        } else {
            const inUSD = amount / (rates[from] || 1);
            const result = inUSD * (rates[to] || 1);
            document.getElementById('convertResult').innerHTML = 
                `${amount} ${from} = ${result.toFixed(2)} ${to}`;
        }
    };

    window.doExchange = async () => {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const amount = parseFloat(document.getElementById('amount').value);

        if (!amount || amount <= 0) {
            showToast('Введите сумму', 'error');
            return;
        }

        const result = await apiCall('exchange', 'POST', { id: uid, from, to, amount });
        if (result) {
            showToast(`Обмен выполнен! Новый баланс: ${result.new_balance.toFixed(2)} USD`, 'success');
            navigate('profile');
        }
    };

    // Промокоды
    function renderPromo() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">🎁 Промокод</h2>
                
                <div class="input-group">
                    <input id="promoCode" class="input-field" placeholder="Введите промокод">
                </div>
                
                <button class="btn" onclick="activatePromo()">
                    <i class="fas fa-ticket-alt"></i> Активировать
                </button>
            </div>
        `;
    }

    window.activatePromo = async () => {
        const code = document.getElementById('promoCode').value.trim().toUpperCase();
        if (!code) {
            showToast('Введите промокод', 'error');
            return;
        }

        const result = await apiCall('promo', 'POST', { id: uid, code });
        if (result) {
            showToast(`Промокод активирован! +${result.amount} USD`, 'success');
            navigate('profile');
        }
    };

    // История
    async function renderHistory() {
        const history = await apiCall(`history?id=${uid}&limit=30`);
        
        const app = document.getElementById('app');
        if (!history || history.length === 0) {
            app.innerHTML = `
                <div class="card" style="text-align: center;">
                    <i class="fas fa-history" style="font-size: 48px; opacity: 0.5; margin: 20px;"></i>
                    <p>История операций пуста</p>
                </div>
            `;
            return;
        }

        app.innerHTML = `
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">📜 История</h2>
                ${history.map(h => `
                    <div class="history-item">
                        <div>
                            <div class="history-type">
                                ${h.type === 'exchange' ? '💱 Обмен' : 
                                  h.type === 'promo' ? '🎁 Промокод' : 
                                  h.type === 'daily_bonus' ? '📅 Бонус' : 
                                  '👥 Реферал'}
                            </div>
                            <div class="history-date">${new Date(h.date).toLocaleString()}</div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.5);">${h.details}</div>
                        </div>
                        <div class="history-amount">
                            ${h.amount > 0 ? '+' : ''}${h.amount.toFixed(2)} ${h.currency}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // Рефералы
    async function renderReferrals() {
        const stats = await apiCall(`referrals?id=${uid}`);
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">👥 Рефералы</h2>
                
                <div style="text-align: center; margin: 30px 0;">
                    <i class="fas fa-users" style="font-size: 64px; opacity: 0.7;"></i>
                    <div style="font-size: 48px; font-weight: 800; margin: 20px 0; color: #84fab0;">
                        ${stats?.count || 0}
                    </div>
                    <div style="font-size: 24px; margin-bottom: 30px;">
                        Заработано: ${stats?.total_bonus?.toFixed(2) || '0.00'} USD
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Ваша реферальная ссылка:</label>
                    <input class="input-field" type="text" value="https://t.me/your_bot?start=${uid}" readonly onclick="this.select()">
                    <button class="btn" onclick="copyReferralLink()">
                        <i class="fas fa-copy"></i> Копировать
                    </button>
                </div>
            </div>
        `;
    }

    // Админка
    async function renderAdmin() {
        const stats = await apiCall(`admin/stats?admin=${uid}`);
        const usersData = await apiCall(`admin/users?admin=${uid}&page=1&per_page=10`);

        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">📊 Статистика</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-users" style="font-size: 24px; color: #84fab0;"></i>
                        <div style="font-size: 24px; font-weight: 700;">${stats?.total_users || 0}</div>
                        <div style="font-size: 12px; opacity: 0.7;">Пользователей</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-ban" style="font-size: 24px; color: #ff6b6b;"></i>
                        <div style="font-size: 24px; font-weight: 700;">${stats?.total_banned || 0}</div>
                        <div style="font-size: 12px; opacity: 0.7;">Заблокировано</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-coins" style="font-size: 24px; color: #f6d365;"></i>
                        <div style="font-size: 24px; font-weight: 700;">${stats?.total_balance?.toFixed(2) || '0.00'}</div>
                        <div style="font-size: 12px; opacity: 0.7;">Баланс USD</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-ticket-alt" style="font-size: 24px; color: #8fd3f4;"></i>
                        <div style="font-size: 24px; font-weight: 700;">${stats?.total_promos || 0}</div>
                        <div style="font-size: 12px; opacity: 0.7;">Промокодов</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">🎫 Создать промокод</h2>
                
                <div class="input-group">
                    <input id="promoCodeAdmin" class="input-field" placeholder="Код промокода">
                </div>
                
                <div class="input-group">
                    <input id="promoAmount" type="number" class="input-field" placeholder="Сумма (USD)" step="0.01">
                </div>
                
                <div class="input-group">
                    <input id="promoUses" type="number" class="input-field" placeholder="Количество использований">
                </div>
                
                <button class="btn" onclick="createPromo()">
                    <i class="fas fa-plus"></i> Создать промокод
                </button>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 28px;">👥 Пользователи</h2>
                
                ${usersData?.users?.map(u => `
                    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>${u.username || 'No username'}</strong>
                                <div style="font-size: 12px; opacity: 0.7;">ID: ${u.id}</div>
                            </div>
                            <div style="font-weight: 700; color: #84fab0;">${u.balance.toFixed(2)} USD</div>
                        </div>
                        <div style="display: flex; gap: 5px; margin-top: 10px;">
                            <button class="btn" style="padding: 10px; font-size: 14px;" onclick="adminAction(${u.id}, 'add_balance', 10)">
                                +10
                            </button>
                            <button class="btn" style="padding: 10px; font-size: 14px;" onclick="adminAction(${u.id}, 'add_balance', 100)">
                                +100
                            </button>
                            <button class="btn" style="padding: 10px; font-size: 14px;" onclick="adminSetBalance(${u.id}, ${u.balance})">
                                ✏️
                            </button>
                            <button class="btn ${u.banned ? 'btn-success' : 'btn-warning'}" 
                                    style="padding: 10px; font-size: 14px;" 
                                    onclick="adminAction(${u.id}, '${u.banned ? 'unban' : 'ban'}')">
                                ${u.banned ? '🔓' : '🔒'}
                            </button>
                        </div>
                    </div>
                `).join('') || ''}
            </div>
        `;
    }

    window.createPromo = async () => {
        const code = document.getElementById('promoCodeAdmin').value.trim().toUpperCase();
        const amount = parseFloat(document.getElementById('promoAmount').value);
        const uses = parseInt(document.getElementById('promoUses').value);

        if (!code || isNaN(amount) || isNaN(uses) || amount <= 0 || uses <= 0) {
            showToast('Заполните все поля корректно', 'error');
            return;
        }

        const result = await apiCall('admin/promocode', 'POST', {
            admin: uid,
            code,
            amount,
            uses
        });

        if (result) {
            showToast('Промокод создан!', 'success');
            renderAdmin();
        }
    };

    window.adminAction = async (userId, action, value = null) => {
        const result = await apiCall(`admin/user/${userId}`, 'POST', {
            admin: uid,
            action,
            value
        });

        if (result) {
            showToast('Действие выполнено', 'success');
            renderAdmin();
        }
    };

    window.adminSetBalance = (userId, currentBalance) => {
        const newBalance = prompt('Введите новый баланс:', currentBalance);
        if (newBalance !== null) {
            adminAction(userId, 'set_balance', parseFloat(newBalance));
        }
    };

    // Инициализация
    renderNav();
    renderPage();
</script>
